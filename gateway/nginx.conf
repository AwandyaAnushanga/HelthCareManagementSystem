worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ========================
    # Upstream Services
    # ========================
    upstream patient_service {
        server patient-service:3001;
    }

    upstream doctor_service {
        server doctor-service:3002;
    }

    upstream appointment_service {
        server appointment-service:3003;
    }

    upstream admin_service {
        server admin-service:3004;
    }

    upstream notification_service {
        server notification-service:3005;
    }

    # ========================
    # Rate Limiting
    # ========================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ========================
    # Server
    # ========================
    server {
        listen 80;
        server_name localhost;

        # Security Headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # Max request body size (for file uploads)
        client_max_body_size 10M;

        # ========================
        # CORS Configuration
        # ========================
        # Handled at the service level via cors middleware

        # ========================
        # Health Check
        # ========================
        location /health {
            return 200 '{"status": "gateway_ok"}';
            add_header Content-Type application/json;
        }

        # ========================
        # Block Internal Routes
        # ========================
        location ~* /internal/ {
            return 403 '{"error": "Forbidden"}';
            add_header Content-Type application/json;
        }

        # ========================
        # Service Routes
        # ========================
        location /api/patients/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://patient_service/api/patients/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/doctors/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://doctor_service/api/doctors/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/appointments/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://appointment_service/api/appointments/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/admin/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://admin_service/api/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://notification_service/api/notifications/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================
        # Default
        # ========================
        location / {
            return 404 '{"error": "Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
